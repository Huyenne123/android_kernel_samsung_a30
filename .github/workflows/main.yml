name: Build R15-OneUI + BPF merge from R24U

on:
  workflow_dispatch:
  push:
    branches: [ ksu-0.9.5-1774163709 ]

env:
  KERNEL_BRANCH: ksu-0.9.5-1774163709

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout kernel source
        uses: actions/checkout@v4
        with:
          ref: ${{ env.KERNEL_BRANCH }}
          path: kernel
          fetch-depth: 0

      - name: Set Git user
        working-directory: ./kernel
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
    
      - name: Setup KernelSUNext
        working-directory: ./kernel
        run: 
          curl -LSs "https://raw.githubusercontent.com/KernelSU-Next/KernelSU-Next/next/kernel/setup.sh" | bash -s v1.1.1
      
      - name: Enable KernelSU in defconfig
        working-directory: ./kernel
        run: |
          echo "CONFIG_KALLSYMS=y" >> arch/arm64/configs/exynos7885-a30_defconfig
          echo "CONFIG_KALLSYMS_ALL=y" >> arch/arm64/configs/exynos7885-a30_defconfig
          echo "CONFIG_KSU=y" >> arch/arm64/configs/exynos7885-a30_defconfig
          echo "CONFIG_KSU_MANUAL_HOOK=y" >> arch/arm64/configs/exynos7885-a30_defconfig
          echo "# CONFIG_KPROBES is not set" >> arch/arm64/configs/exynos7885-a30_defconfig
          echo "# CONFIG_HAVE_KPROBES is not set" >> arch/arm64/configs/exynos7885-a30_defconfig
          echo "# CONFIG_KPROBES_EVENTS is not set" >> arch/arm64/configs/exynos7885-a30_defconfig
          tail -10 arch/arm64/configs/exynos7885-a30_defconfig
      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y bc bison flex libssl-dev make git python3 cpio gcc-aarch64-linux-gnu
      - name: Setup Neutron Clang
        run: |
          mkdir -p toolchain
          cd toolchain
          bash <(curl -s "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman") -S=10032024
          bash <(curl -s "https://raw.githubusercontent.com/Neutron-Toolchains/antman/main/antman") --patch=glibc
          cd ..
          echo "$(pwd)/toolchain/bin" >> $GITHUB_PATH
      - name: Set environment
        run: |
          echo "CC=clang" >> $GITHUB_ENV
          echo "LD=ld.lld" >> $GITHUB_ENV
          echo "AR=llvm-ar" >> $GITHUB_ENV
          echo "NM=llvm-nm" >> $GITHUB_ENV
          echo "OBJCOPY=llvm-objcopy" >> $GITHUB_ENV
          echo "OBJDUMP=llvm-objdump" >> $GITHUB_ENV
          echo "STRIP=llvm-strip" >> $GITHUB_ENV
          echo "CROSS_COMPILE=aarch64-linux-gnu-" >> $GITHUB_ENV
          echo "ARCH=arm64" >> $GITHUB_ENV
      - name: Configure kernel
        working-directory: ./kernel
        run: |
          make O=out ARCH=arm64 exynos7885-a30_defconfig
          
      - name: Build kernel
        working-directory: ./kernel
        run: |
          make -j$(nproc) O=out ARCH=arm64 \
            CC=${CC} LD=${LD} AR=${AR} NM=${NM} \
            OBJCOPY=${OBJCOPY} OBJDUMP=${OBJDUMP} STRIP=${STRIP} \
            CROSS_COMPILE=${CROSS_COMPILE} 2>&1 | tee build.log
      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: kernel/build.log

      - name: Prepare AnyKernel from source
        run: |
          cp -r kernel/kernel_zip/anykernel anykernel

      - name: Copy kernel image
        run: |
          cp kernel/out/arch/arm64/boot/Image.gz-dtb anykernel/ || \
          cp kernel/out/arch/arm64/boot/Image.gz anykernel/ || \
          cp kernel/out/arch/arm64/boot/Image anykernel/

      - name: Create flashable zip
        run: |
          cd anykernel
          zip -r9 ../neyuKernel_testing.zip *
          cd ..
      - name: Upload zip
        uses: actions/upload-artifact@v4
        with:
          name: neyuKernel_testing
          path: neyuKernel_testing.zip
